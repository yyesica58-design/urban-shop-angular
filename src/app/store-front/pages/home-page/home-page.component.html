<h1 class="text-xl font-bold mt-2">Todos los productos</h1>
<h2 class="text-lg mb-5">Explora lo último en tendencias y encuentra tu estilo ideal entre todos nuestros productos.</h2>


<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 mt-2 gap-3">
  @for (product of productsResource.value()?.products; track product.id) {
    <product-card [product]="product" ></product-card>
  }
  @empty{
    <p>No hay productos</p>
  }
</div>
<div class="my-8">
  <app-pagination [pages]="productsResource.value()?.pages ?? 0" [currentPage]="paginationService.currentPage()"></app-pagination>

</div>
