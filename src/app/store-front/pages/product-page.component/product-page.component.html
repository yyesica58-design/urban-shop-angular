@if(productResource.isLoading()){

  <div class="flex justify-center items-center h-screen">
    <span class="loading loading-dots loading-lg"></span>
  </div>
}

@if(productResource.hasValue()){
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-5">

    <product-carousel [images]="productResource.value()?.images ?? []"></product-carousel>
    <div>
      <h2 class="text-2xl font-bold sm:mx-5 text-primary">{{productResource.value()?.title}}</h2>
      <div class="divider"></div>
      <div>

      </div>
      <p class="sm:mx-5">
        {{productResource.value()?.description}}
      </p>
    </div>
  </div>
}
